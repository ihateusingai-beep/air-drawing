<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Maskable icon — 80% safe zone, 10% padding all sides.
    iOS / Android 會自動裁切, 主要視覺要喺中心 80% 區域。
    See: https://maskable.app/
  -->
  <defs>
    <linearGradient id="bgM" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bgM)"/>
  <!-- Safe zone: 51-461 (410 wide, centered) -->
  <circle cx="256" cy="240" r="70" fill="#fbbf24"/>
  <text x="256" y="278" font-size="90" text-anchor="middle" fill="#0f172a">🎨</text>
  <text x="256" y="380" font-size="44" text-anchor="middle" font-weight="700" fill="#f59e0b" font-family="system-ui">畫筆</text>
