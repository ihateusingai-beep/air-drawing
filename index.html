<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/air-drawing/favicon.svg" />
    <!--
      Cross-device viewport (R11 緩解):
      - viewport-fit=cover: 支援 iPhone notch + iPad safe area
      - user-scalable=no: 鎖 zoom (iPad 觸控 / 智障友善)
      - maximum-scale=1, minimum-scale=1: 進一步鎖
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1, minimum-scale=1"
    />
    <meta name="theme-color" content="#0f172a" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f8fafc" />
    <meta name="description" content="Non-verbal 表達輔具 — Plutchik 8 emotion vocabulary, iPad + Notebook cross-device, 100% client-side, 0 上傳" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="魔法畫筆" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!--
      Content-Security-Policy (R27 智障私隱 — 0 user data 上傳硬保險)
      v3.0.7.2: 加 MediaPipe 官方 CDN (jsdelivr WASM + storage.googleapis.com model)
      - 仍然 0 user data 上傳: 冇 analytics, 冇 telemetry, 冇雲端 sync
      - MediaPipe Hand/Pose 嘅 model + WASM 係公開 ML model, 唔含 user data
      - PLAN §4b 原本就允許 cdn.jsdelivr.net (Phase 4b 歸零 spec 之前嘅暫時措施)
      - tailwindcss 同 jsdelivr 同 storage googleapis 全部加晒入 connect-src / script-src / worker-src
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdn.tailwindcss.com https://storage.googleapis.com; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self' https://cdn.jsdelivr.net https://storage.googleapis.com; worker-src 'self' https://cdn.jsdelivr.net blob:; object-src 'none'; base-uri 'self'; form-action 'self';"
    />
    <title>AI 魔法空中畫筆 · Non-verbal 表達輔具</title>
    <!--
      PWA manifest (Phase 4b 提前 ship, R14 緩解)
      iOS 16.4+ 完整支援 Web App Manifest
    -->
    <link rel="manifest" href="/air-drawing/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/air-drawing/apple-touch-icon.svg" />
    <!--
      Phase 1: Tailwind CDN (暫時, Phase 4 改 @tailwindcss/vite plugin)
      Source 同源: 原 source 嘅 https://cdn.tailwindcss.com
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" crossorigin src="/air-drawing/assets/index-DjVhyvXT.js"></script>
    <link rel="stylesheet" crossorigin href="/air-drawing/assets/index-CBKMhyx1.css">
  <script id="vite-plugin-pwa:register-sw" src="/air-drawing/registerSW.js"></script></head>
  <body class="bg-slate-900 text-white antialiased">
    <div id="root"></div>
  </body>
</html>
